name: Q-Net vacancy monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qnet-vacancy-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MONITOR_UNTIL: "2026-07-23T18:00:00+09:00"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Check Q-Net and notify Telegram
        run: npm run check

      - name: Save notification state
        run: |
          if git diff --quiet -- .state/qnet-state.json; then
            exit 0
          fi
          git config user.name "qnet-monitor[bot]"
          git config user.email "qnet-monitor[bot]@users.noreply.github.com"
          git add .state/qnet-state.json
          git commit -m "chore: update Q-Net monitor state"
          git push
