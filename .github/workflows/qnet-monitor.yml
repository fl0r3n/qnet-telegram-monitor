name: Q-Net vacancy monitor

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/qnet-monitor.yml"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "3-59/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test:
        description: Send a Telegram test notification only
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: qnet-vacancy-monitor
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MONITOR_UNTIL: "2026-07-23T18:00:00+09:00"
      SEND_TEST_NOTIFICATION: ${{ github.event.inputs.send_test || 'false' }}
      CITIES: "아산시,천안시"
      CHECK_INTERVAL_SECONDS: "60"
      CONTINUOUS_RUN_MINUTES: "330"
      MAX_CONSECUTIVE_FAILURES: "5"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Send Telegram test notification
        if: env.SEND_TEST_NOTIFICATION == 'true'
        run: npm run check

      - name: Monitor Asan and Cheonan continuously
        if: env.SEND_TEST_NOTIFICATION != 'true'
        run: node src/run-multicity-continuous.mjs

      - name: Save notification state
        run: |
          git add .state/*.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "qnet-monitor[bot]"
          git config user.email "qnet-monitor[bot]@users.noreply.github.com"
          git commit -m "chore: update Q-Net monitor state"
          git pull --rebase origin main
          git push
